<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="24" fill="url(#grad)"/>
  <!-- Cross / medical symbol -->
  <rect x="21" y="10" width="6" height="28" rx="3" fill="white" opacity="0.95"/>
  <rect x="10" y="21" width="28" height="6" rx="3" fill="white" opacity="0.95"/>
  <!-- Small leaf accent -->
  <ellipse cx="32" cy="16" rx="4" ry="6" fill="white" opacity="0.4" transform="rotate(-30 32 16)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
